<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#bfe3ff" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <title>我的小世界</title>
  </head>
  <body>
    <!-- 3D 画布 -->
    <canvas id="scene"></canvas>

    <!-- 顶部：天气 / 昼夜 / 声音 / 重置 -->
    <div id="top-bar"></div>
    <!-- ✨ 魔法面板：第二行，由 Toolbar.js 填充，点 ✨ 滑出 -->
    <div id="magic-bar"></div>
    <div id="population-status" class="population-status">🦕 恐龙 0 / 100</div>
    <div id="star-chip" class="star-chip">⭐ 0</div>

    <!-- 左上角：温和任务芯片（图标 + 进度点，不识字也能懂），由 Quests.js 填充 -->
    <div id="quest-panel"></div>

    <!-- 底部：创造工具 -->
    <div id="toolbar"></div>

    <!-- 恐龙图鉴（贴纸书）模态 + 解锁吐司；内容由 Pedia.js 打开时按当前语言重建 -->
    <div id="pedia-modal" class="pedia-modal hidden"></div>
    <div id="pedia-toasts"></div>

    <!-- ⚙️ 设置面板模态（音量/画质/语言），内容由 Settings.js 打开时按当前语言重建 -->
    <div id="settings-modal" class="pedia-modal hidden"></div>

    <!-- 开始引导（同时解锁声音）；中文文本是 JS 加载前的 fallback -->
    <div id="splash">
      <!-- 分层程序化场景：太阳 + 漂移云 + 3 层马卡龙岛屿剪影（纯装饰） -->
      <div class="splash-scene" aria-hidden="true">
        <div class="splash-sun"></div>
        <div class="splash-cloud c1"></div>
        <div class="splash-cloud c2"></div>
        <svg class="splash-isles" viewBox="0 0 1000 260" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path fill="#ffd1e3" d="M0 180 Q120 80 260 150 Q340 60 470 130 Q600 40 720 140 Q850 70 1000 160 V260 H0 Z"/>
          <path fill="#c9b8f0" d="M0 215 Q160 130 320 190 Q480 110 640 185 Q800 120 1000 200 V260 H0 Z"/>
          <path fill="#a5e6c3" d="M0 245 Q200 185 400 230 Q620 175 820 235 Q920 210 1000 235 V260 H0 Z"/>
        </svg>
      </div>
      <button id="lang-btn" class="lang-btn">中/EN</button>
      <div class="splash-card">
        <div class="splash-emoji">🌍✨</div>
        <h1 data-i18n="splash.title">我的小世界</h1>
        <p data-i18n="splash.subtitle">选择一个世界，然后继续自由创造</p>
        <button id="continue-btn" class="hidden" data-i18n="splash.continue">继续上次的世界 ▶</button>
        <div id="preset-list" class="preset-list">
          <button class="preset-card selected" data-preset="park">
            <span class="preset-icon"><svg viewBox="0 0 80 48" xmlns="http://www.w3.org/2000/svg">
              <rect width="80" height="48" rx="10" fill="#dff3ff"/>
              <circle cx="64" cy="11" r="6" fill="#ffd25a"/>
              <path d="M0 36 Q20 24 40 34 Q60 26 80 36 V48 H0 Z" fill="#9ade8f"/>
              <rect x="22" y="24" width="4" height="9" rx="2" fill="#9a6b3f"/>
              <circle cx="24" cy="20" r="8" fill="#52b86a"/>
              <circle cx="48" cy="36" r="3" fill="#ff8fb5"/><circle cx="58" cy="38" r="3" fill="#ffd25a"/>
            </svg></span>
            <strong data-i18n="preset.park.name">恐龙乐园</strong>
            <small data-i18n="preset.park.desc">树林、花田和食草龙</small>
          </button>
          <button class="preset-card" data-preset="canyon">
            <span class="preset-icon"><svg viewBox="0 0 80 48" xmlns="http://www.w3.org/2000/svg">
              <rect width="80" height="48" rx="10" fill="#ffe9d6"/>
              <circle cx="14" cy="12" r="5" fill="#ffd25a"/>
              <path d="M2 48 L24 14 L40 38 L54 8 L78 48 Z" fill="#c9a3e8"/>
              <path d="M24 14 L30 24 H18 Z M54 8 L61 20 H47 Z" fill="#fff"/>
              <path d="M0 44 Q40 38 80 44 V48 H0 Z" fill="#9ade8f"/>
            </svg></span>
            <strong data-i18n="preset.canyon.name">高山峡谷</strong>
            <small data-i18n="preset.canyon.desc">高山环绕的开阔谷地</small>
          </button>
          <button class="preset-card" data-preset="islands">
            <span class="preset-icon"><svg viewBox="0 0 80 48" xmlns="http://www.w3.org/2000/svg">
              <rect width="80" height="48" rx="10" fill="#cdeffb"/>
              <circle cx="66" cy="10" r="5" fill="#ffd25a"/>
              <path d="M0 38 Q40 32 80 38 V48 H0 Z" fill="#7cc7ee"/>
              <ellipse cx="22" cy="36" rx="14" ry="6" fill="#f3dc9a"/>
              <ellipse cx="58" cy="39" rx="11" ry="5" fill="#f3dc9a"/>
              <rect x="20" y="22" width="3" height="10" rx="1.5" fill="#9a6b3f"/>
              <circle cx="21.5" cy="19" r="6" fill="#52b86a"/>
            </svg></span>
            <strong data-i18n="preset.islands.name">群岛世界</strong>
            <small data-i18n="preset.islands.desc">几座小岛组成的家园</small>
          </button>
          <button class="preset-card" data-preset="blank">
            <span class="preset-icon"><svg viewBox="0 0 80 48" xmlns="http://www.w3.org/2000/svg">
              <rect width="80" height="48" rx="10" fill="#efe6ff"/>
              <ellipse cx="40" cy="38" rx="24" ry="7" fill="#f3dc9a"/>
              <path d="M40 8 l2.6 6.4 6.4 2.6 -6.4 2.6 -2.6 6.4 -2.6-6.4 -6.4-2.6 6.4-2.6 Z" fill="#ffd25a"/>
              <circle cx="60" cy="22" r="2.5" fill="#ff8fb5"/><circle cx="18" cy="16" r="2" fill="#8fd0ff"/>
            </svg></span>
            <strong data-i18n="preset.blank.name">从零开始</strong>
            <small data-i18n="preset.blank.desc">宽阔空岛，全部自己创造</small>
          </button>
        </div>
        <!-- 静态 disabled + 载入中：开始页本身就是加载屏，main.js 装配完毕后启用 -->
        <button id="start-btn" disabled data-i18n="splash.loading">载入中…</button>
      </div>
    </div>

    <!-- 健壮性遮罩（默认隐藏；中文静态文案保证 JS 完全没加载时也可读） -->
    <div id="webgl-fallback" class="boundary-overlay">
      <div class="boundary-card">
        <div class="boundary-emoji">🦕💤</div>
        <h2 data-i18n="fallback.title">打不开 3D 小世界</h2>
        <p data-i18n="fallback.body">这台设备暂时不支持 3D。请换一个新一点的浏览器（比如 Chrome）再来玩吧！</p>
      </div>
    </div>
    <div id="error-overlay" class="boundary-overlay">
      <div class="boundary-card">
        <div class="boundary-emoji">🙈</div>
        <h2 data-i18n="error.title">哎呀！</h2>
        <p data-i18n="error.body">小世界遇到了一点小麻烦。别担心，你的世界已经保存好啦！</p>
        <!-- 内联 onclick：错误边界出现时 JS 状态不可信，重载必须零依赖可用 -->
        <button class="boundary-reload" onclick="location.reload()" data-i18n="error.reload">重新开始 ▶</button>
      </div>
    </div>
    <div id="context-overlay" class="boundary-overlay">
      <div class="boundary-card">
        <div class="boundary-emoji">🪄</div>
        <h2 data-i18n="context.restoring">正在恢复…</h2>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
